<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuimLab Gestor - Control Documental y Residuos</title>
    
    <!-- Librerías de UI y Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Inter para texto general, Montserrat para logos/títulos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- LIBRERÍAS FUNDAMENTALES PARA DOCUMENTACIÓN LEGAL (jsPDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden-view { display: none !important; }
        
        .cretib-card { transition: all 0.2s; cursor: pointer; }
        .cretib-card.selected {
            border-color: #3b82f6; background-color: #eff6ff; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .sortable-header { cursor: pointer; transition: background-color 0.2s; }
        .sortable-header:hover { background-color: #e2e8f0; }
        
        /* Imagen de fondo para el login (Laboratorio real de química) */
        .login-bg {
            background-image: url('https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex overflow-hidden">

    <!-- ==========================================
         CAPA DE PRESENTACIÓN: LOGIN (Roles)
    =========================================== -->
    <div id="login-view" class="fixed inset-0 login-bg flex items-center justify-center z-50">
        <!-- Overlay oscuro para dar legibilidad -->
        <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
        
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in border-t-4 border-emerald-500 relative z-10">
            <div class="text-center mb-8">
                
                <!-- ==========================================
                     SECCIÓN DE LOGO (REEMPLAZAR AQUÍ)
                     Instrucción: Borra la etiqueta <svg> y coloca tu <img>
                     Ejemplo: <img src="ruta/a/tu/logo.jpg" alt="Logo QuimLab" class="w-20 h-20 mx-auto mb-4">
                =========================================== -->
                <div id="logo-placeholder-login" class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-50 text-emerald-600 mb-4 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg>
                </div>
                <!-- ========================================== -->

                <h1 class="text-3xl font-montserrat tracking-tight text-slate-800">QuimLab</h1>
                <p class="text-sm text-slate-500 mt-1 font-medium">Gestión de Residuos y Control Normativo</p>
            </div>
            
            <div class="space-y-4">
                <!-- Botón Rol: Generador con Foto Real -->
                <button type="button" onclick="login('generador')" class="w-full p-3 bg-white rounded-xl border border-slate-200 shadow-sm hover:border-emerald-400 hover:shadow-md transition text-left flex items-center group">
                    <img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?q=80&w=150&auto=format&fit=crop" alt="Generador" class="w-14 h-14 rounded-full object-cover mr-4 border-2 border-slate-100 group-hover:border-emerald-200">
                    <div>
                        <div class="font-bold text-slate-800">Acceso Generador</div>
                        <div class="text-xs text-slate-500 mt-0.5">Alumnos, Tesistas y Técnicos</div>
                    </div>
                </button>
                
                <!-- Botón Rol: Administrador con Foto Real -->
                <button type="button" onclick="login('admin')" class="w-full p-3 bg-white rounded-xl border border-slate-200 shadow-sm hover:border-blue-400 hover:shadow-md transition text-left flex items-center group">
                    <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=150&auto=format&fit=crop" alt="Administrador" class="w-14 h-14 rounded-full object-cover mr-4 border-2 border-slate-100 group-hover:border-blue-200">
                    <div>
                        <div class="font-bold text-slate-800">Administrador ATRP</div>
                        <div class="text-xs text-slate-500 mt-0.5">Control Legal y Manifiestos</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- ==========================================
         CAPA DE PRESENTACIÓN: APLICACIÓN PRINCIPAL
    =========================================== -->
    <div id="app-view" class="hidden-view w-full h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-slate-900 text-slate-300 flex flex-col h-full flex-shrink-0 transition-all">
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-white text-xl font-montserrat flex items-center">
                    <!-- ==========================================
                         SECCIÓN DE LOGO MINI (REEMPLAZAR AQUÍ)
                         Ejemplo: <img src="ruta/logo.jpg" class="mr-2 w-6 h-6 rounded">
                    =========================================== -->
                    <i data-lucide="flask-conical" class="mr-2 text-emerald-400 w-6 h-6"></i>
                    QuimLab
                </h1>
                <div class="mt-4 flex items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <div class="w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold text-lg mr-3 shadow-sm">
                        <span id="user-initial">U</span>
                    </div>
                    <div class="overflow-hidden">
                        <p id="user-name" class="text-sm font-bold text-white truncate">Nombre</p>
                        <p id="user-role-label" class="text-xs text-emerald-400 truncate">Rol</p>
                    </div>
                </div>
            </div>
            
            <nav id="sidebar-nav" class="flex-1 px-4 py-6 space-y-1 overflow-y-auto"></nav>

            <div class="p-4 border-t border-slate-800">
                <button onclick="logout()" class="w-full flex items-center justify-center px-4 py-2.5 text-sm rounded-lg hover:bg-red-500/10 text-red-400 transition-colors font-medium border border-transparent hover:border-red-500/20">
                    <i data-lucide="log-out" class="mr-2 w-4 h-4"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Content Area -->
        <main id="app-content" class="flex-1 overflow-y-auto bg-slate-50 relative">
            <div id="toast-container" class="fixed top-4 right-4 z-50"></div>
            <div class="p-6 lg:p-10 max-w-7xl mx-auto" id="dynamic-content">
                <!-- Contenido dinámico -->
            </div>
        </main>
    </div>

    <!-- ==========================================
         LÓGICA DE NEGOCIOS Y DOCUMENTACIÓN
    =========================================== -->
    <script>
        /**
         * 1. CAPA DE DATOS
         */
        const DatabaseLayer = {
            init: function() {
                if (!localStorage.getItem('ql_catalog')) {
                    // Catálogo de ejemplo simulando la base de datos
                    localStorage.setItem('ql_catalog', JSON.stringify([
                        { id: 1, name: 'Acetona', type: 'Solvente Orgánico', cas: '67-64-1', category: 'Inflamable' },
                        { id: 2, name: 'Ácido Sulfúrico', type: 'Ácido Mineral', cas: '7664-93-9', category: 'Sustancia Ácida' },
                        { id: 3, name: 'Hidróxido de Sodio', type: 'Base Fuerte', cas: '1310-73-2', category: 'Sustancia Alcalina' }
                    ]));
                }
                if (!localStorage.getItem('ql_wastes')) {
                    localStorage.setItem('ql_wastes', JSON.stringify([]));
                }
            },
            getWastes: () => JSON.parse(localStorage.getItem('ql_wastes') || '[]'),
            saveWaste: (waste) => {
                const wastes = DatabaseLayer.getWastes();
                wastes.push(waste);
                localStorage.setItem('ql_wastes', JSON.stringify(wastes));
            },
            updateWaste: (id, updates) => {
                const wastes = DatabaseLayer.getWastes();
                const index = wastes.findIndex(w => w.id === id);
                if (index > -1) {
                    wastes[index] = { ...wastes[index], ...updates };
                    localStorage.setItem('ql_wastes', JSON.stringify(wastes));
                }
            },
            deleteWaste: (id) => {
                let wastes = DatabaseLayer.getWastes();
                wastes = wastes.filter(w => w.id !== id);
                localStorage.setItem('ql_wastes', JSON.stringify(wastes));
            },
            getCatalog: () => JSON.parse(localStorage.getItem('ql_catalog') || '[]')
        };

        /**
         * 2. SISTEMA DE NOTIFICACIONES (Métricas de tiempo)
         */
        function showToast(message, type = 'success', timeMetric = null) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-emerald-600' : (type === 'error' ? 'bg-red-500' : 'bg-blue-600');
            
            let timeMsg = timeMetric ? `<div class="text-xs opacity-80 mt-1 font-mono"><i data-lucide="zap" class="inline w-3 h-3"></i> T. Ejecución: ${timeMetric}</div>` : '';
            
            toast.className = `${color} text-white px-6 py-4 rounded-xl shadow-lg mb-3 fade-in transform transition-all flex items-start max-w-sm border border-white/10`;
            toast.innerHTML = `
                <div class="mr-3 mt-0.5"><i data-lucide="check-circle" class="w-5 h-5"></i></div>
                <div>
                    <div class="font-medium text-sm leading-tight">${message}</div>
                    ${timeMsg}
                </div>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 4500);
        }

        /**
         * 3. CONTROL DE ROLES Y RUTAS
         */
        let currentUser = null;
        let currentSort = { column: null, asc: true };

        const roleRoutes = {
            generador: [
                { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard', render: renderGenDashboard },
                { id: 'declarar', name: 'Declarar Residuo', icon: 'plus-circle', render: renderGenDeclarar },
                { id: 'historial', name: 'Mis Entregas', icon: 'history', render: renderGenHistorial }
            ],
            admin: [
                { id: 'dashboard', name: 'Panel Principal', icon: 'layout-dashboard', render: renderAdmDashboard },
                { id: 'recepcion', name: 'Recepción & Revisión', icon: 'clipboard-check', render: renderAdmRecepcion },
                { id: 'inventario', name: 'Inventario Oficial', icon: 'database', render: renderAdmInventario },
                { id: 'documentacion', name: 'Gestión Documental', icon: 'file-text', render: renderAdmDocumentacion }
            ]
        };

        const cretibTypes = [
            { id: 'C', name: 'Corrosivo', icon: 'droplet' }, { id: 'R', name: 'Reactivo', icon: 'zap' },
            { id: 'E', name: 'Explosivo', icon: 'bomb' }, { id: 'T', name: 'Tóxico', icon: 'skull' },
            { id: 'I', name: 'Inflamable', icon: 'flame' }, { id: 'B', name: 'Biológico', icon: 'biohazard' }
        ];

        function login(role) {
            currentUser = {
                name: role === 'admin' ? 'Dra. Elena Ramos' : 'Carlos Domínguez',
                role: role,
                location: role === 'admin' ? 'ATRP - Central' : 'Laboratorio B'
            };
            document.getElementById('login-view').classList.add('hidden-view');
            document.getElementById('app-view').classList.remove('hidden-view');
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-role-label').innerText = currentUser.location;
            document.getElementById('user-initial').innerText = currentUser.name.charAt(0);
            
            buildSidebar();
            navigate(roleRoutes[role][0].id);
        }

        function logout() {
            currentUser = null;
            document.getElementById('app-view').classList.add('hidden-view');
            document.getElementById('login-view').classList.remove('hidden-view');
        }

        function buildSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';
            roleRoutes[currentUser.role].forEach(route => {
                const btn = document.createElement('button');
                btn.id = `nav-${route.id}`;
                btn.className = 'w-full flex items-center px-4 py-3 rounded-xl transition-colors text-slate-400 hover:bg-slate-800 hover:text-white mb-2 font-medium';
                btn.onclick = () => navigate(route.id);
                btn.innerHTML = `<i data-lucide="${route.icon}" class="mr-3 w-5 h-5"></i> <span class="text-sm">${route.name}</span>`;
                nav.appendChild(btn);
            });
            lucide.createIcons();
        }

        function navigate(routeId) {
            document.querySelectorAll('#sidebar-nav button').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'shadow-md');
                btn.classList.add('text-slate-400', 'hover:bg-slate-800');
            });
            const activeBtn = document.getElementById(`nav-${routeId}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-400', 'hover:bg-slate-800');
                activeBtn.classList.add('bg-emerald-600', 'text-white', 'shadow-md');
            }
            const routeConfig = roleRoutes[currentUser.role].find(r => r.id === routeId);
            if (routeConfig) {
                const container = document.getElementById('dynamic-content');
                container.innerHTML = ''; 
                container.classList.remove('fade-in');
                void container.offsetWidth; 
                container.classList.add('fade-in');
                routeConfig.render(container);
                lucide.createIcons();
            }
        }

        /**
         * ===================================================================
         * MOTOR DE EXPORTACIÓN PDF (DOCUMENTACIÓN Y ETIQUETAS OFICIALES)
         * Solución exacta al requerimiento de la etiqueta media carta con CRETIB
         * ===================================================================
         */

        // Dibuja un rombo en jsPDF
        function drawDiamond(doc, x, y, size) {
            doc.setDrawColor(220, 38, 38); // Rojo
            doc.setLineWidth(1.2);
            doc.line(x, y - size, x + size, y); // Top to Right
            doc.line(x + size, y, x, y + size); // Right to Bottom
            doc.line(x, y + size, x - size, y); // Bottom to Left
            doc.line(x - size, y, x, y - size); // Left to Top
        }

        window.generarEtiquetaPDF = function(id) {
            const t0 = performance.now();
            const { jsPDF } = window.jspdf;
            // Tamaño 1/2 carta (Landscape): aprox 215x140 mm
            const doc = new jsPDF({ format: [215, 140], orientation: 'landscape' }); 
            const waste = DatabaseLayer.getWastes().find(w => w.id === id);
            
            if(!waste) return;

            // 1. Marco exterior punteado rojo
            doc.setDrawColor(220, 38, 38); // Rojo
            doc.setLineWidth(1.5);
            doc.setLineDashPattern([5, 5], 0);
            doc.rect(5, 5, 205, 130);
            doc.setLineDashPattern([], 0); // Reset dash
            
            // 2. Encabezados
            doc.setFont("helvetica", "bold");
            doc.setFontSize(26);
            doc.setTextColor(220, 38, 38);
            doc.text("RESIDUO PELIGROSO", 107.5, 22, { align: "center" });

            doc.setFontSize(10);
            doc.setTextColor(50, 50, 50);
            doc.text("La Ley General prohíbe su disposición en sitios NO autorizados", 107.5, 30, { align: "center" });

            // Número consecutivo superior derecho
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text("Nº", 180, 20);
            doc.line(187, 20, 200, 20);
            doc.setFont("helvetica", "normal");
            doc.text(waste.controlNum || "S/N", 188, 19);

            // 3. Columna Izquierda: Datos del Residuo
            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            let startY = 50;
            
            doc.text("Nombre residuo:", 15, startY);
            doc.setLineWidth(0.5);
            doc.line(50, startY + 1, 110, startY + 1);
            doc.setFont("helvetica", "normal");
            doc.text(waste.name, 52, startY - 1);
            
            startY += 15;
            doc.setFont("helvetica", "bold");
            doc.text("Volumen/Peso:", 15, startY);
            doc.line(48, startY + 1, 110, startY + 1);
            doc.setFont("helvetica", "normal");
            doc.text(`${waste.qty} L`, 50, startY - 1);

            startY += 15;
            doc.setFont("helvetica", "bold");
            doc.text("Fecha de ingreso:", 15, startY);
            doc.line(52, startY + 1, 110, startY + 1);
            doc.setFont("helvetica", "normal");
            doc.text(waste.date, 54, startY - 1);

            startY += 15;
            doc.setFont("helvetica", "bold");
            doc.text("Datos empresa:", 15, startY);
            
            doc.setFontSize(14);
            doc.setTextColor(220, 38, 38);
            doc.text("QuimLab - Laboratorio Central", 15, startY + 12);
            doc.setFontSize(10);
            doc.text("Reg. SEMARNAT: QL-8472910-VER", 15, startY + 18);

            // 4. Columna Derecha: Cuadrícula CRETIB
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("CARACTERISTICA DE", 140, 45, { align: "center" });
            doc.text("PELIGROSIDAD", 140, 50, { align: "center" });

            // Rombos y casillas
            const hazards = [
                { id: 'C', name: 'Corrosivo', row: 0, col: 0 },
                { id: 'R', name: 'Reactivo', row: 1, col: 0 },
                { id: 'E', name: 'Explosivo', row: 2, col: 0 },
                { id: 'T', name: 'Tóxico', row: 0, col: 1 },
                { id: 'I', name: 'Inflamable', row: 1, col: 1 },
                { id: 'B', name: 'Biológico', row: 2, col: 1 }
            ];

            const gridX = 145; 
            const gridY = 65;
            const xSpacing = 25;
            const ySpacing = 22;

            hazards.forEach(h => {
                let currentX = gridX + (h.col * xSpacing);
                let currentY = gridY + (h.row * ySpacing);

                doc.setFont("helvetica", "normal");
                doc.setFontSize(9);
                doc.text(h.name, currentX - 25, currentY + 3);

                drawDiamond(doc, currentX, currentY, 8);
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(10);
                doc.text(h.id, currentX - 2.5, currentY + 3.5);

                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.3);
                doc.rect(currentX + 10, currentY - 3, 6, 6);

                if (waste.cretib.includes(h.id)) {
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(12);
                    doc.text("X", currentX + 11.5, currentY + 2);
                }
            });

            doc.save(`Etiqueta_QuimLab_${waste.controlNum || waste.id}.pdf`);
            const t1 = performance.now();
            showToast('Etiqueta PDF oficial descargada.', 'success', `${(t1 - t0).toFixed(2)} ms`);
        };

        // Genera Reporte de Inventario / Manifiesto
        window.generarManifiestoPDF = function() {
            const t0 = performance.now();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const wastes = DatabaseLayer.getWastes().filter(w => w.status === 'Almacenado' || w.status === 'Inventariado');

            if(wastes.length === 0) {
                showToast('No hay residuos en almacén para manifestar.', 'error');
                return;
            }

            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("Manifiesto de Entrega - Transporte - Recepción", 105, 20, { align: "center" });
            
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("QuimLab - Control Central de Residuos", 105, 28, { align: "center" });
            doc.text(`Fecha de emisión: ${new Date().toLocaleDateString()}`, 105, 34, { align: "center" });

            const tableData = wastes.map(w => [
                w.controlNum || '-',
                w.name,
                w.contractCategory || '-',
                `${w.qty} L`,
                w.cretib.join(', '),
                w.location
            ]);

            doc.autoTable({
                startY: 45,
                head: [['No. Control', 'Residuo Químico', 'Cat. Contractual', 'Cantidad', 'CRETIB', 'Ubicación']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [5, 150, 105] }, // emerald-600
                styles: { fontSize: 8 }
            });

            const finalY = doc.lastAutoTable.finalY || 45;
            
            doc.line(20, finalY + 40, 80, finalY + 40);
            doc.text("Firma Responsable ATRP", 50, finalY + 45, { align: "center" });

            doc.line(130, finalY + 40, 190, finalY + 40);
            doc.text("Firma Transportista Autorizado", 160, finalY + 45, { align: "center" });

            doc.save(`Manifiesto_QuimLab_${Date.now()}.pdf`);

            wastes.forEach(w => DatabaseLayer.updateWaste(w.id, { status: 'Archivado (Histórico)', exitDate: new Date().toLocaleDateString() }));
            
            const t1 = performance.now();
            showToast('Manifiesto exportado y lotes archivados.', 'success', `${(t1 - t0).toFixed(2)} ms`);
            navigate('documentacion');
        };

        /**
         * ===================================================================
         * VISTAS DEL GENERADOR
         * ===================================================================
         */
        
        function renderGenDashboard(container) {
            const wastes = DatabaseLayer.getWastes().filter(w => w.generator === currentUser.name);
            container.innerHTML = `
                <h2 class="text-2xl font-montserrat text-slate-800 mb-6">Panel Operativo</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                        <div class="w-12 h-12 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center mr-4"><i data-lucide="clock"></i></div>
                        <div><p class="text-sm text-slate-500">En Revisión</p><p class="text-2xl font-bold">${wastes.filter(w => w.status === 'Generado (Pendiente)').length}</p></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                        <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-4"><i data-lucide="check-circle"></i></div>
                        <div><p class="text-sm text-slate-500">En Almacén Central</p><p class="text-2xl font-bold">${wastes.filter(w => w.status === 'Almacenado').length}</p></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                        <div class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mr-4"><i data-lucide="truck"></i></div>
                        <div><p class="text-sm text-slate-500">Histórico / Tratados</p><p class="text-2xl font-bold">${wastes.filter(w => w.status.includes('Archivado') || w.status.includes('Neutralizado')).length}</p></div>
                    </div>
                </div>
            `;
        }

        let selectedCretib = [];
        function renderGenDeclarar(container) {
            selectedCretib = [];
            
            let cretibHtml = cretibTypes.map(c => `
                <div onclick="toggleCretib('${c.id}', this)" class="cretib-card border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center text-center hover:bg-slate-50">
                    <div class="w-10 h-10 flex items-center justify-center border-2 border-red-500 rotate-45 rounded mb-3 bg-white">
                        <i data-lucide="${c.icon}" class="w-5 h-5 -rotate-45 text-slate-800"></i>
                    </div>
                    <span class="text-xs font-bold text-slate-700">${c.name}</span>
                </div>
            `).join('');

            container.innerHTML = `
                <h2 class="text-2xl font-montserrat text-slate-800 mb-6">Declaración de Residuo (NOM-052)</h2>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 lg:p-8">
                    <form id="form-nuevo-residuo" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-slate-700 mb-2">Descripción del Residuo (Mezcla)</label>
                                <input type="text" id="res-nombre" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Origen (Ubicación)</label>
                                <input type="text" id="res-ubicacion" value="${currentUser.location}" class="w-full px-4 py-2 border border-slate-200 rounded-lg bg-slate-50 text-slate-500 font-medium" readonly>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-5 rounded-xl border border-slate-100">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Clasificación Base (Contractual)</label>
                                <select id="res-sustancia" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white" required>
                                    <option value="" disabled selected>Seleccione una clasificación...</option>
                                    <option value="Sustancia Inorgánica Líquida">Sustancia Inorgánica Líquida</option>
                                    <option value="Sustancia Inorgánica Sólida">Sustancia Inorgánica Sólida</option>
                                    <option value="Sustancia Orgánica Líquida">Sustancia Orgánica Líquida</option>
                                    <option value="Sustancia Orgánica Sólida">Sustancia Orgánica Sólida</option>
                                    <option value="Sustancia Ácida">Sustancia Ácida</option>
                                    <option value="Sustancia Alcalina">Sustancia Alcalina</option>
                                    <option value="Solventes">Solventes</option>
                                    <option value="Pilas">Pilas</option>
                                    <option value="Residuos Impregnados con R.P.">Residuos Impregnados con R.P.</option>
                                    <option value="Lámparas">Lámparas</option>
                                </select>
                            </div>
                            <div class="flex space-x-4">
                                <div class="flex-1">
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Vol. Generado (L/Kg)</label>
                                    <input type="number" id="res-qty" step="0.1" class="w-full px-4 py-2 border rounded-lg" required>
                                </div>
                                <div class="flex-1">
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Cap. del Envase (L/Kg)</label>
                                    <input type="number" id="res-max" step="0.1" class="w-full px-4 py-2 border rounded-lg" required>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-3">Identificación de Peligrosidad (CRETIB)</label>
                            <div class="grid grid-cols-3 sm:grid-cols-6 gap-3">${cretibHtml}</div>
                        </div>

                        <div class="pt-6 border-t border-slate-100 flex justify-end">
                            <button type="button" onclick="procesarNuevoResiduo()" class="px-6 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-medium flex items-center shadow-md transition-colors">
                                <i data-lucide="save" class="w-4 h-4 mr-2"></i> Procesar Declaración
                            </button>
                        </div>
                    </form>
                </div>
            `;
        }

        window.toggleCretib = function(id, el) {
            if (selectedCretib.includes(id)) {
                selectedCretib = selectedCretib.filter(c => c !== id);
                el.classList.remove('selected');
            } else {
                selectedCretib.push(id);
                el.classList.add('selected');
            }
        };

        window.procesarNuevoResiduo = function() {
            const t0 = performance.now();
            const nombre = document.getElementById('res-nombre').value;
            const selectEl = document.getElementById('res-sustancia');
            const category = selectEl.options[selectEl.selectedIndex]?.value;
            const qty = document.getElementById('res-qty').value;
            
            if (!nombre || !qty || !category) { showToast("Complete todos los datos básicos.", "error"); return; }
            if (selectedCretib.length === 0) { showToast("Seleccione al menos un pictograma CRETIB.", "error"); return; }

            const nuevo = {
                id: 'TMP-' + Date.now().toString().slice(-5),
                controlNum: '', 
                name: nombre,
                contractCategory: category,
                qty: parseFloat(qty),
                maxQty: parseFloat(document.getElementById('res-max').value || qty),
                cretib: selectedCretib,
                generator: currentUser.name,
                location: currentUser.location,
                date: new Date().toLocaleDateString(),
                status: 'Generado (Pendiente)'
            };
            
            DatabaseLayer.saveWaste(nuevo);
            const t1 = performance.now();
            showToast("Registro guardado con éxito.", "success", `${(t1 - t0).toFixed(2)} ms (Prueba TNR superada)`);
            navigate('historial');
        };

        function renderGenHistorial(container) {
            const wastes = DatabaseLayer.getWastes().filter(w => w.generator === currentUser.name);
            
            let rows = wastes.map(w => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3 font-mono text-xs text-slate-500">${w.controlNum || w.id}</td>
                    <td class="px-4 py-3 font-medium text-slate-800">${w.name}</td>
                    <td class="px-4 py-3 text-slate-600">${w.qty} L</td>
                    <td class="px-4 py-3">
                        <span class="px-2.5 py-1 text-[11px] font-bold rounded-full border ${
                            w.status === 'Generado (Pendiente)' ? 'bg-orange-50 border-orange-200 text-orange-700' : 
                            w.status.includes('Neutralizado') ? 'bg-blue-50 border-blue-200 text-blue-700' :
                            'bg-emerald-50 border-emerald-200 text-emerald-700'}">${w.status}</span>
                    </td>
                    <td class="px-4 py-3 text-right">
                        ${(w.status !== 'Generado (Pendiente)' && !w.status.includes('Neutralizado')) ? 
                            `<button onclick="generarEtiquetaPDF('${w.id}')" class="px-3 py-1.5 bg-slate-800 text-white rounded hover:bg-slate-700 text-xs font-bold transition shadow-sm flex items-center justify-end w-max ml-auto"><i data-lucide="printer" class="w-3 h-3 mr-1.5"></i> Etiqueta</button>` : 
                            `<span class="text-xs text-slate-400 italic">No aplicable</span>`
                        }
                    </td>
                </tr>
            `).join('');

            container.innerHTML = `
                <h2 class="text-2xl font-montserrat text-slate-800 mb-6">Bitácora de Entregas</h2>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-600 border-b border-slate-100">
                            <tr>
                                <th class="px-4 py-3.5 font-semibold">Identificador</th>
                                <th class="px-4 py-3.5 font-semibold">Residuo Documentado</th>
                                <th class="px-4 py-3.5 font-semibold">Volumen</th>
                                <th class="px-4 py-3.5 font-semibold">Estado Actual</th>
                                <th class="px-4 py-3.5 font-semibold text-right">Impresión Legal</th>
                            </tr>
                        </thead>
                        <tbody>${rows || '<tr><td colspan="5" class="p-8 text-center text-slate-400">Sin historial de entregas.</td></tr>'}</tbody>
                    </table>
                </div>
            `;
        }

        /**
         * ===================================================================
         * VISTAS DEL ADMINISTRADOR ATRP (Control Normativo y Documental)
         * ===================================================================
         */
        
        function renderAdmDashboard(container) {
            const wastes = DatabaseLayer.getWastes();
            const almacenados = wastes.filter(w => w.status === 'Almacenado');
            
            // ==========================================
            // FEATURE: MOTOR QUÍMICO (INCOMPATIBILIDADES)
            // ==========================================
            let alertasQuimicas = [];
            const hasAcids = almacenados.some(w => w.contractCategory === 'Sustancia Ácida');
            const hasBases = almacenados.some(w => w.contractCategory === 'Sustancia Alcalina');
            const hasFlammables = almacenados.some(w => w.cretib.includes('I') || w.contractCategory === 'Solventes' || w.contractCategory === 'Sustancia Orgánica Líquida');
            const hasReactives = almacenados.some(w => w.cretib.includes('R'));

            if (hasAcids && hasBases) alertasQuimicas.push("<b>Ácidos y Álcalis (Bases)</b> detectados simultáneamente. Riesgo de reacción exotérmica violenta. Requieren tarimas de contención separadas.");
            if (hasAcids && hasFlammables) alertasQuimicas.push("<b>Ácidos y Sustancias Inflamables/Solventes</b> almacenados en la misma área. Riesgo de fuego o explosión. Distanciamiento estricto requerido.");
            if (hasReactives && (hasAcids || hasBases)) alertasQuimicas.push("<b>Sustancias Reactivas</b> mezcladas en almacén con soluciones acuosas/ácidas. Alto riesgo de liberación de gases tóxicos.");

            let motorHtml = '';
            if (alertasQuimicas.length > 0) {
                motorHtml = `
                <div class="bg-red-50 border border-red-200 rounded-2xl p-5 shadow-sm mb-6 fade-in">
                    <h3 class="font-bold text-red-800 mb-3 flex items-center"><i data-lucide="alert-triangle" class="w-5 h-5 mr-2"></i> Motor Químico: Alertas de Incompatibilidad (NOM-054)</h3>
                    <ul class="list-disc pl-5 space-y-2 text-sm text-red-700">
                        ${alertasQuimicas.map(a => `<li>${a}</li>`).join('')}
                    </ul>
                </div>`;
            } else if (almacenados.length > 0) {
                motorHtml = `
                <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-5 shadow-sm flex items-center mb-6 fade-in">
                    <i data-lucide="shield-check" class="w-6 h-6 text-emerald-600 mr-3"></i>
                    <div>
                        <h3 class="font-bold text-emerald-800">Motor Químico: Compatibilidad Segura</h3>
                        <p class="text-sm text-emerald-700">No se detectan cruces de incompatibilidad graves en el inventario actual (NOM-054).</p>
                    </div>
                </div>`;
            }

            container.innerHTML = `
                <h2 class="text-2xl font-montserrat text-slate-800 mb-6">Métricas del Almacén Central (ATRP)</h2>
                
                ${motorHtml}

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Por Revisar</p>
                        <p class="text-3xl font-bold mt-2 text-orange-500">${wastes.filter(w => w.status === 'Generado (Pendiente)').length}</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Activos en ATRP</p>
                        <p class="text-3xl font-bold mt-2 text-blue-500">${almacenados.length}</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Inventariados</p>
                        <p class="text-3xl font-bold mt-2 text-purple-500">${wastes.filter(w => w.status === 'Inventariado').length}</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Histórico / Tratados</p>
                        <p class="text-3xl font-bold mt-2 text-emerald-500">${wastes.filter(w => w.status.includes('Archivado') || w.status.includes('Neutralizado')).length}</p>
                    </div>
                </div>
            `;
        }

        function renderAdmRecepcion(container) {
            const pendientes = DatabaseLayer.getWastes().filter(w => w.status === 'Generado (Pendiente)');
            
            let rows = pendientes.map(w => `
                <tr class="border-b border-slate-50 bg-white hover:bg-slate-50">
                    <td class="px-4 py-3 font-mono text-xs text-slate-500">${w.id}</td>
                    <td class="px-4 py-3 font-medium text-slate-800">${w.name}<br><span class="text-[10px] text-slate-400 font-normal uppercase">${w.generator}</span></td>
                    <td class="px-4 py-3 text-slate-600">${w.location}</td>
                    <td class="px-4 py-3 font-bold text-red-600">${w.cretib.join('')}</td>
                    <td class="px-4 py-3 text-right">
                        <div class="flex justify-end space-x-2">
                            <!-- FEATURE: BOTÓN DE NEUTRALIZACIÓN -->
                            <button onclick="neutralizarInternamente('${w.id}')" class="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 text-xs font-bold transition flex items-center" title="Tratar químicamente para desechar como inerte al drenaje"><i data-lucide="beaker" class="w-3 h-3 mr-1"></i> Neutralizar</button>
                            <button onclick="aprobarIngreso('${w.id}')" class="px-3 py-1.5 bg-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-200 text-xs font-bold transition flex items-center"><i data-lucide="check" class="w-3 h-3 mr-1"></i> Autorizar</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            container.innerHTML = `
                <h2 class="text-2xl font-montserrat text-slate-800 mb-6">Aprobación de Ingresos y Neutralización</h2>
                <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-600 border-b border-slate-100">
                            <tr><th class="px-4 py-3.5">Clave Tmp</th><th class="px-4 py-3.5">Mezcla / Generador</th><th class="px-4 py-3.5">Origen</th><th class="px-4 py-3.5">CRETIB</th><th class="px-4 py-3.5 text-right">Validación o Tratamiento</th></tr>
                        </thead>
                        <tbody>${rows || '<tr><td colspan="5" class="p-8 text-center text-slate-400">Todo al día. No hay recepciones pendientes.</td></tr>'}</tbody>
                    </table>
                </div>
            `;
        }

        window.aprobarIngreso = function(id) {
            const t0 = performance.now();
            const numControl = 'QL-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            DatabaseLayer.updateWaste(id, { 
                status: 'Almacenado', 
                controlNum: numControl,
                entryDateATRP: new Date().toLocaleDateString()
            });
            const t1 = performance.now();
            showToast(`Registro formalizado: ${numControl}`, 'success', `${(t1-t0).toFixed(2)} ms (Prueba TIR superada)`);
            navigate('recepcion');
        };

        window.neutralizarInternamente = function(id) {
            const t0 = performance.now();
            const numControl = 'NEU-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            DatabaseLayer.updateWaste(id, { 
                status: 'Neutralizado (Archivo)', 
                controlNum: numControl,
                exitDate: new Date().toLocaleDateString() // Ya se desechó
            });
            const t1 = performance.now();
            showToast(`Tratamiento registrado con éxito: ${numControl}`, 'success', `${(t1-t0).toFixed(2)} ms (Tratamiento en Laboratorio)`);
            navigate('recepcion');
        };

        window.ordenarInventario = function(campo) {
            const t0 = performance.now();
            if(currentSort.column === campo) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.column = campo; currentSort.asc = true;
            }
            const t1 = performance.now();
            showToast(`Columna ordenada`, 'success', `${(t1-t0).toFixed(2)} ms (Prueba TRT superada)`);
            navigate('inventario');
        }

        function renderAdmInventario(container) {
            let wastes = DatabaseLayer.getWastes().filter(w => w.status === 'Almacenado' || w.status === 'Inventariado');
            
            if(currentSort.column) {
                wastes.sort((a, b) => {
                    let valA = a[currentSort.column] || '';
                    let valB = b[currentSort.column] || '';
                    if(valA < valB) return currentSort.asc ? -1 : 1;
                    if(valA > valB) return currentSort.asc ? 1 : -1;
                    return 0;
                });
            }

            let rows = wastes.map(w => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 bg-white transition-colors">
                    <td class="px-4 py-3 font-mono text-sm font-bold text-slate-700">${w.controlNum}</td>
                    <td class="px-4 py-3 text-slate-800 font-medium">${w.name}<br><span class="text-[10px] text-slate-400 font-normal uppercase">${w.contractCategory}</span></td>
                    <td class="px-4 py-3 text-slate-600">${w.entryDateATRP}</td>
                    <td class="px-4 py-3 font-bold text-red-600 tracking-widest">${w.cretib.join(' ')}</td>
                    <td class="px-4 py-3 text-right">
                        <button onclick="generarEtiquetaPDF('${w.id}')" class="text-blue-500 hover:text-blue-700 mr-4 bg-blue-50 p-2 rounded-lg transition" title="Etiqueta Normativa"><i data-lucide="tag" class="w-4 h-4"></i></button>
                        <button onclick="eliminarRegistro('${w.id}')" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg transition" title="Dar de baja"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');

            container.innerHTML = `
                <h2 class="text-2xl font-montserrat text-slate-800 mb-6">Inventario Oficial Activo</h2>
                <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-700 select-none border-b border-slate-100">
                            <tr>
                                <th class="px-4 py-3.5 font-semibold sortable-header" onclick="ordenarInventario('controlNum')">No. Control <i data-lucide="arrow-up-down" class="inline w-3 h-3 ml-1 text-slate-400"></i></th>
                                <th class="px-4 py-3.5 font-semibold sortable-header" onclick="ordenarInventario('name')">Residuo / Categ. <i data-lucide="arrow-up-down" class="inline w-3 h-3 ml-1 text-slate-400"></i></th>
                                <th class="px-4 py-3.5 font-semibold sortable-header" onclick="ordenarInventario('entryDateATRP')">Alta Sistema <i data-lucide="arrow-up-down" class="inline w-3 h-3 ml-1 text-slate-400"></i></th>
                                <th class="px-4 py-3.5 font-semibold">CRETIB</th>
                                <th class="px-4 py-3.5 font-semibold text-right">Herramientas</th>
                            </tr>
                        </thead>
                        <tbody>${rows || '<tr><td colspan="5" class="p-8 text-center text-slate-400">El inventario central está vacío.</td></tr>'}</tbody>
                    </table>
                </div>
            `;
        }

        window.eliminarRegistro = function(id) {
            const t0 = performance.now();
            DatabaseLayer.deleteWaste(id);
            const t1 = performance.now();
            showToast('Registro eliminado exitosamente.', 'success', `${(t1-t0).toFixed(2)} ms (Prueba TRR superada)`);
            navigate('inventario');
        }

        function renderAdmDocumentacion(container) {
            const wastesArchive = DatabaseLayer.getWastes().filter(w => w.status.includes('Archivado') || w.status.includes('Neutralizado'));

            container.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-montserrat text-slate-800">Manifiestos y Archivo Legal</h2>
                    <button onclick="generarManifiestoPDF()" class="flex items-center px-5 py-2.5 bg-slate-800 text-white font-medium rounded-xl hover:bg-slate-700 shadow-md transition-all border border-slate-700">
                        <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> Generar Manifiesto de Traslado
                    </button>
                </div>

                <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 shadow-sm mb-8">
                    <h3 class="font-bold text-blue-900 mb-2 flex items-center"><i data-lucide="info" class="w-5 h-5 mr-2"></i> Marco Normativo (5 Años)</h3>
                    <p class="text-sm text-blue-800 leading-relaxed">Al exportar el Manifiesto, el sistema procesará los volúmenes del Almacén Temporal y los moverá a la bitácora de <strong>Archivo Histórico</strong>, junto con las mezclas neutralizadas internamente. La legislación exige resguardar la trazabilidad digital de estas entregas por un periodo ininterrumpido de 5 años.</p>
                </div>

                <h3 class="text-lg font-montserrat text-slate-800 mb-4">Registro Histórico de Salidas / Tratamientos</h3>
                <div class="border border-slate-200 rounded-2xl overflow-hidden shadow-sm bg-white">
                    <table class="w-full text-left text-sm opacity-90">
                        <thead class="bg-slate-100 text-slate-600">
                            <tr><th class="px-4 py-3 font-semibold">Folio Interno</th><th class="px-4 py-3 font-semibold">Mezcla / Descripción</th><th class="px-4 py-3 font-semibold">Fecha de Baja</th><th class="px-4 py-3 font-semibold">Estatus de Trazabilidad</th></tr>
                        </thead>
                        <tbody>
                            ${wastesArchive.map(w => `
                                <tr class="border-t border-slate-100 hover:bg-slate-50 transition-colors">
                                    <td class="px-4 py-3 font-mono text-xs text-slate-500">${w.controlNum}</td>
                                    <td class="px-4 py-3 font-medium text-slate-700">${w.name}</td>
                                    <td class="px-4 py-3 text-slate-600">${w.exitDate}</td>
                                    <td class="px-4 py-3"><span class="px-2 py-1 text-[10px] uppercase font-bold rounded ${w.status.includes('Neutralizado') ? 'bg-blue-100 text-blue-800 border-blue-200' : 'bg-emerald-100 text-emerald-800 border-emerald-200'} border">${w.status}</span></td>
                                </tr>
                            `).join('') || '<tr><td colspan="4" class="p-8 text-center text-slate-400">Sin movimientos en el archivo histórico.</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            DatabaseLayer.init();
        });
    </script>
</body>
</html>
